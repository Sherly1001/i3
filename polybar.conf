[colors]
background = #b222
background-alt = #b444
foreground = #eee
foreground-alt = #666
foreground-tray-alt = #aaa
primary = #add8e6
secondary = #e60053
alert = #bd2c40

[bar/bar1]
;monitor = ${env:MONITOR:HDMI-1}
width = 100%
height = 28
radius = 6.0
fixed-center = false
override-redirect = true
wm-restack = i3

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3
line-color = #f00

border-size = 4
border-color = #0000

padding-left = 0
padding-right = 30

module-margin-left = 1
module-margin-right = 2

font-0 = "Noto Sans:style=Regular:size=13;0"
font-1 = "Noto Sans CJK JP:size=13:size=13;0"
font-2 = "Noto Sans Mono:size=12;0"
font-3 = "Joypixels:scale=10;0"
font-4 = "Font Awesome 5 Free:size=13;0"
font-5 = "Font Awesome 5 Brands Regular:size=13;0"
font-6 = "Font Awesome 5 Free Solid:style=Solid:size=13;0"
;font-7 = "Siji:size=13;0"

modules-left = i3 shernoob
modules-center = xwindow
modules-right = wlan eth pulseaudio brightness battery date powermenu

tray-position = right
tray-padding = 2
tray-background = ${colors.background}
tray-transparent = true
tray-detached = true
tray-offset-x = -6

;scroll-up = #i3.prev
;scroll-down = #i3.next

cursor-click = pointer
;cursor-scroll = ns-resize

[module/bspwm]
type = internal/bspwm

label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.primary}
label-focused-padding = 2

label-occupied = %name%
label-occupied-padding = 2

label-urgent = %name%!
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.foreground-alt}
label-empty-padding = 2

; Separator in between workspaces
; label-separator = |

[module/i3]
type = internal/i3
index-sort = true
label-focused-underline = ${colors.primary}
label-urgent-background = ${colors.alert}
label-unfocused-foreground = ${colors.foreground-alt}
label-separator = |
label-focused-padding = 1
label-unfocused-padding = 1
label-urgent-padding = 1
label-mode = %mode%
label-mode-padding = 2
label-mode-background = #e01d1d

[module/shernoob]
type = custom/text
content = | Sher - Noob |
content-underline = #38798f
content-padding = 0

[module/xwindow]
type = internal/xwindow
label = %title:0:80:...%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.foreground-tray-alt}
format-underline = #f90000
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.foreground-tray-alt}
format-underline = #4bffdc
label = %percentage_used%%

[module/wlan]
type = internal/network
interface = wlp3s0
interval = 3.0

format-connected = <ramp-signal> <label-connected>
format-connected-underline = #9f78e1
label-connected = %essid%

format-disconnected =
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-tray-alt}

ramp-signal-0 = 
ramp-signal-foreground = ${colors.foreground-tray-alt}

[module/pulseaudio]
type = internal/pulseaudio
sink = alsa_output.pci-0000_00_1f.3.analog-stereo
use-ui-max = true
interval = 5

format-volume = <ramp-volume> <label-volume>
format-volume-underline = #0f0
label-muted =  %percentage%%
format-muted-underline = #f00

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.foreground-tray-alt}

ramp-headphones-0 = 
ramp-headphones-1 = 

[module/alsa]
type = internal/alsa

master-soundcard = hw:0
speaker-soundcard = hw:0
headphone-soundcard = hw:0

master-mixer = Master
speaker-mixer = Speaker
headphone-mixer = Headphone

headphone-id = 16
mapped = true

format-volume = <ramp-volume> <label-volume>
format-volume-underline = #0f0
label-muted =  %percentage%%
format-muted-underline = #f00

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.foreground-tray-alt}

ramp-headphones-0 = 
ramp-headphones-1 = 

[module/eth]
type = internal/network
interface = enp2s0
interval = 3.0

format-connected-underline = #55aa55
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.foreground-tray-alt}
label-connected = Wired

format-disconnected =
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-tray-alt}

[module/date]
type = internal/date
interval = 30

date = " %a %D"
time = %H:%M

format-prefix = 
format-prefix-foreground = ${colors.foreground-tray-alt}
format-underline = #0a6cf5

label = %date% %time%

[module/brightness]
type = custom/script
exec = ~/.config/i3/scripts/brightness.sh
tail = true
format-underline = #ff0

scroll-up = light -A 5; kill -2 `cat /tmp/brightness.pid`
scroll-down = light -U 5; kill -2 `cat /tmp/brightness.pid`

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 100

format-charging = <animation-charging> <label-charging>
format-charging-underline = #ffb52a

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-underline = ${self.format-charging-underline}

format-full-prefix = " "
format-full-prefix-foreground = ${colors.foreground-tray-alt}
format-full-underline = ${self.format-charging-underline}

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.foreground-tray-alt}

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-foreground = ${colors.foreground-tray-alt}
animation-charging-framerate = 750

animation-discharging-0 = 
animation-discharging-1 = 
animation-discharging-2 = 
animation-discharging-3 = 
animation-discharging-4 = 
animation-discharging-foreground = ${colors.foreground-tray-alt}
animation-discharging-framerate = 750

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60

format = <ramp> <label>
format-underline = #f50a4d
format-warn = <ramp> <label-warn>
format-warn-underline = ${self.format-underline}

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.secondary}

ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-foreground = ${colors.foreground-tray-alt}

[module/powermenu]
type = custom/menu

expand-right = true

format-spacing = 1

label-open = 
label-open-foreground = ${colors.secondary}
label-close =  cancel
label-close-foreground = ${colors.secondary}
label-separator = |
label-separator-foreground = ${colors.foreground-tray-alt}

menu-0-0 = reboot
menu-0-0-exec = #powermenu.open.1
menu-0-1 = power off
menu-0-1-exec = #powermenu.open.2

menu-1-0 = cancel
menu-1-0-exec = #powermenu.open.0
menu-1-1 = reboot
menu-1-1-exec = reboot

menu-2-0 = power off
menu-2-0-exec = #powermenu.open.3
menu-2-1 = hibernate
menu-2-1-exec = #powermenu.open.4

menu-3-0 = cancel
menu-3-0-exec = #powermenu.open.0
menu-3-1 = power off
menu-3-1-exec = poweroff

menu-4-0 = hibernate
menu-4-0-exec = systemctl hibernate
menu-4-1 = cancel
menu-4-1-exec = #powermenu.open.0

[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

[global/wm]
margin-top = 5
margin-bottom = 5

; vim:ft=dosini
